actionType: CheckTargetTokenOrHost
fields:
  _hostType:
    type: string
    description: host Type
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
      -
        value: BUFF_SOURCE
        display: false
        parse:
          type: literal
          return: BUFF_SOURCE
  _tokenType:
    type: string
    description: token Type
    values:
      -
        value: BUFF_SOURCE
        display: false
        parse:
          type: literal
          return: BUFF_SOURCE
      -
        value: TARGET
        display: false
        parse:
          type: literal
          return: TARGET