actionType: CheckEnemyId
fields:
  _filterIds:
    type: array
    description: filter Ids
    schema: action_subschema/_filterIds.yml
    parse:
      type: fn
      name: parseArrayDefault
      args:
        - $input
        - $ctx
  _isUnset:
    type: boolean
    description: is Unset
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _loadIdFromBb:
    type: boolean
    description: load Id From Bb
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
  _targetType:
    type: string
    description: target Type
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
      -
        value: MODIFIER_SOURCE
        display: false
        parse:
          type: literal
          return: MODIFIER_SOURCE
      -
        value: TARGET
        display: false
        parse:
          type: literal
          return: TARGET