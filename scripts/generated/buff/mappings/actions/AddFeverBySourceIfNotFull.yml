actionType: AddFeverBySourceIfNotFull
fields:
  _feverKey:
    type: string
    description: fever Key
    values:
      -
        value: env_033_fever
        display: false
        parse:
          type: literal
          return: env_033_fever
  _sourceType:
    type: string
    description: source Type
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
      -
        value: BUFF_SOURCE
        display: false
        parse:
          type: literal
          return: BUFF_SOURCE