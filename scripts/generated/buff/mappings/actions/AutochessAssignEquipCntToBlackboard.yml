actionType: AutochessAssignEquipCntToBlackboard
fields:
  _blackboardKey:
    type: string
    description: blackboard Key
    schema: action_subschema/_blackboardKey.yml
    parse:
      type: fn
      name: parseObjectDefault
      args:
        - $input
        - $ctx
  _onlyGoldenEquip:
    type: boolean
    description: only Golden Equip
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _targetType:
    type: string
    description: target Type
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER