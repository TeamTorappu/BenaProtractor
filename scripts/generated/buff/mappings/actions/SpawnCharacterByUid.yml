actionType: SpawnCharacterByUid
fields:
  _addBuffToTarget:
    type: boolean
    description: add Buff To Target
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _buffs:
    type: array
    description: buffs
    schema: action_subschema/_buffs.yml
    parse:
      type: fn
      name: parseArrayDefault
      args:
        - $input
        - $ctx
  _freely:
    type: boolean
    description: freely
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _getPosViaBB:
    type: boolean
    description: get Pos Via B B
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _target:
    type: string
    description: target
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER