actionType: AttachAsDerivedBuff
fields:
  _buff:
    type: object
    description: buff
    schema: action_subschema/_buff.yml
    parse:
      type: fn
      name: parseObjectDefault
      args:
        - $input
        - $ctx
  _buffKey:
    type: string
    description: buff Key
    values:
      -
        value: mass_loss
        display: false
        parse:
          type: literal
          return: mass_loss
  _finishDerivedBuffIfParentFinish:
    type: boolean
    description: finish Derived Buff If Parent Finish
    values:
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _loadFromBlackboard:
    type: boolean
    description: load From Blackboard
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
  _sourceType:
    type: string
    description: source Type
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER