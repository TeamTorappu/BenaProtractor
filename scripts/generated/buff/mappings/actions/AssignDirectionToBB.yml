actionType: AssignDirectionToBB
fields:
  _blackboardKey:
    type: string
    description: blackboard Key
    schema: action_subschema/_blackboardKey.yml
    parse:
      type: fn
      name: parseObjectDefault
      args:
        - $input
        - $ctx
  _isReverse:
    type: boolean
    description: is Reverse
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
  _targetType:
    type: string
    description: target Type
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
      -
        value: BUFF_SOURCE
        display: false
        parse:
          type: literal
          return: BUFF_SOURCE
      -
        value: TARGET
        display: false
        parse:
          type: literal
          return: TARGET