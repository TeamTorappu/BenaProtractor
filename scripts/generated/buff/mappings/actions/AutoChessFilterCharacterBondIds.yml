actionType: AutoChessFilterCharacterBondIds
fields:
  _bondIds:
    type: array
    description: bond Ids
    schema: action_subschema/_bondIds.yml
    parse:
      type: fn
      name: parseArrayDefault
      args:
        - $input
        - $ctx
  _checkTargetInRangeId:
    type: null | string
    description: check Target In Range Id
    values:
      -
        value: ""
        display: false
        parse:
          type: literal
          return: ""
      -
        value: null
        display: false
        parse:
          type: literal
          return: null
      -
        value: x-4
        display: false
        parse:
          type: literal
          return: x-4
  _considerManiShip:
    type: boolean
    description: consider Mani Ship
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _target:
    type: string
    description: target
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
      -
        value: TARGET
        display: false
        parse:
          type: literal
          return: TARGET