actionType: CreateBuffToFootball
fields:
  _buffData:
    type: object
    description: buff Data
    schema: action_subschema/_buffData.yml
    parse:
      type: fn
      name: parseObjectDefault
      args:
        - $input
        - $ctx
  _finishDerivedBuffIfParentFinish:
    type: boolean
    description: finish Derived Buff If Parent Finish
    values:
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _isDerivedBuff:
    type: boolean
    description: is Derived Buff
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
  _targetType:
    type: string
    description: target Type
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER