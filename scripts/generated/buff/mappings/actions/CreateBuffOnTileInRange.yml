actionType: CreateBuffOnTileInRange
fields:
  _buffSourceType:
    type: string
    description: buff Source Type
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
  _buffs:
    type: array
    description: buffs
    schema: action_subschema/_buffs.yml
    parse:
      type: fn
      name: parseArrayDefault
      args:
        - $input
        - $ctx
  _hasSource:
    type: boolean
    description: has Source
    values:
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _rangeId:
    type: string
    description: range Id
    values:
      -
        value: 0-1
        display: false
        parse:
          type: literal
          return: 0-1
  _side:
    type: string
    description: side
    values:
      -
        value: ALLY
        display: false
        parse:
          type: literal
          return: ALLY
  _targetOptions:
    type: object
    description: target Options
    schema: action_subschema/_targetOptions.yml
    parse:
      type: fn
      name: parseObjectDefault
      args:
        - $input
        - $ctx