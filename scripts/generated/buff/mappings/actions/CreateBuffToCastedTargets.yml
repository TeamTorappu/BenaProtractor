actionType: CreateBuffToCastedTargets
fields:
  _buff:
    type: object
    description: buff
    schema: action_subschema/_buff.yml
    parse:
      type: fn
      name: parseObjectDefault
      args:
        - $input
        - $ctx
  _buffSource:
    type: string
    description: buff Source
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
  _finishDerivedBuffIfParentFinish:
    type: boolean
    description: finish Derived Buff If Parent Finish
    values:
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _isDerivedBuff:
    type: boolean
    description: is Derived Buff
    values:
      -
        value: true
        display: false
        parse:
          type: literal
          return: true