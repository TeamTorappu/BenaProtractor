actionType: CopyCharacterSharedBlackboard
fields:
  _blackboardKey:
    type: string
    description: blackboard Key
    schema: action_subschema/_blackboardKey.yml
    parse:
      type: fn
      name: parseObjectDefault
      args:
        - $input
        - $ctx
  _copyToSharedBlackboard:
    type: boolean
    description: copy To Shared Blackboard
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _target:
    type: string
    description: target
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
      -
        value: TARGET
        display: false
        parse:
          type: literal
          return: TARGET