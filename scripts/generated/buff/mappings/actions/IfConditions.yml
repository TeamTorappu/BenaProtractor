actionType: IfConditions
fields:
  _conditionsNode:
    type: array
    description: conditions Node
    schema: action_subschema/_conditionsNode.yml
    parse:
      type: fn
      name: parseActionArray
      args:
        - $input
        - $ctx
  _failNodes:
    type: array | null
    description: fail Nodes
    schema: action_subschema/_failNodes.yml
    parse:
      type: fn
      name: parseActionArray
      args:
        - $input
        - $ctx
  _isAnd:
    type: boolean
    description: is And
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _succeedNodes:
    type: array | null
    description: succeed Nodes
    schema: action_subschema/_succeedNodes.yml
    parse:
      type: fn
      name: parseActionArray
      args:
        - $input
        - $ctx