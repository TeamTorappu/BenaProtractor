actionType: CheckContainsBuff
fields:
  _buffKeys:
    type: array
    description: buff Keys
    schema: action_subschema/_buffKeys.yml
    parse:
      type: fn
      name: parseArrayDefault
      args:
        - $input
        - $ctx
  _buffSourceType:
    type: string
    description: buff Source Type
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
      -
        value: BUFF_SOURCE
        display: false
        parse:
          type: literal
          return: BUFF_SOURCE
  _checkBuffSource:
    type: boolean
    description: check Buff Source
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _checkSourceHost:
    type: boolean
    description: check Source Host
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
  _loadFromBlackboard:
    type: boolean
    description: load From Blackboard
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _targetType:
    type: string
    description: target Type
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
      -
        value: BUFF_SOURCE
        display: false
        parse:
          type: literal
          return: BUFF_SOURCE
      -
        value: MAIN_TARGET
        display: false
        parse:
          type: literal
          return: MAIN_TARGET
      -
        value: MODIFIER_SOURCE
        display: false
        parse:
          type: literal
          return: MODIFIER_SOURCE
      -
        value: MODIFIER_TARGET
        display: false
        parse:
          type: literal
          return: MODIFIER_TARGET
      -
        value: SOURCE
        display: false
        parse:
          type: literal
          return: SOURCE
      -
        value: TARGET
        display: false
        parse:
          type: literal
          return: TARGET
  isAND:
    type: boolean
    description: is A N D
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true