actionType: CheckEnemyLevelMask
fields:
  _targetLevelMask:
    type: string
    description: target Level Mask
    values:
      -
        value: BOSS
        display: false
        parse:
          type: literal
          return: BOSS
      -
        value: ELITE_AND_BOSS
        display: false
        parse:
          type: literal
          return: ELITE_AND_BOSS
  _targetType:
    type: string
    description: target Type
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
      -
        value: MODIFIER_TARGET
        display: false
        parse:
          type: literal
          return: MODIFIER_TARGET
      -
        value: TARGET
        display: false
        parse:
          type: literal
          return: TARGET