actionType: SetCharacterMaxEs
fields:
  _blackboardKey:
    type: null | string
    description: blackboard Key
    schema: action_subschema/_blackboardKey.yml
    parse:
      type: fn
      name: parseObjectDefault
      args:
        - $input
        - $ctx
  _maxEsRatio:
    type: number
    description: max Es Ratio
    values:
      -
        value: 0
        display: false
        parse:
          type: literal
          return: 0
      -
        value: 1
        display: false
        parse:
          type: literal
          return: 1
      -
        value: 10
        display: false
        parse:
          type: literal
          return: 10
      -
        value: 100
        display: false
        parse:
          type: literal
          return: 100
      -
        value: 99999
        display: false
        parse:
          type: literal
          return: 99999
  _targetType:
    type: string
    description: target Type
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER