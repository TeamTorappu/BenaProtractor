actionType: CreateBuffUseTargetAsSource
fields:
  _buff:
    type: object
    description: buff
    schema: action_subschema/_buff.yml
    parse:
      type: fn
      name: parseObjectDefault
      args:
        - $input
        - $ctx
  _buffOwner:
    type: string
    description: buff Owner
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
      -
        value: BUFF_SOURCE
        display: false
        parse:
          type: literal
          return: BUFF_SOURCE
      -
        value: MODIFIER_SOURCE
        display: false
        parse:
          type: literal
          return: MODIFIER_SOURCE
      -
        value: SOURCE
        display: false
        parse:
          type: literal
          return: SOURCE
  _finishDerivedBuffIfParentFinish:
    type: boolean
    description: finish Derived Buff If Parent Finish
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _isDerivedBuff:
    type: boolean
    description: is Derived Buff
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _target:
    type: string
    description: target
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
      -
        value: BUFF_SOURCE
        display: false
        parse:
          type: literal
          return: BUFF_SOURCE
      -
        value: TARGET
        display: false
        parse:
          type: literal
          return: TARGET