actionType: CreateBuffToCertainSideUnits
fields:
  _buff:
    type: object
    description: buff
    schema: action_subschema/_buff.yml
    parse:
      type: fn
      name: parseObjectDefault
      args:
        - $input
        - $ctx
  _finishDerivedBuffIfParentFinish:
    type: boolean
    description: finish Derived Buff If Parent Finish
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _isDerivedBuff:
    type: boolean
    description: is Derived Buff
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _noSource:
    type: boolean
    description: no Source
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _sideMask:
    type: string
    description: side Mask
    values:
      -
        value: ALLY
        display: false
        parse:
          type: literal
          return: ALLY
      -
        value: ENEMY
        display: false
        parse:
          type: literal
          return: ENEMY