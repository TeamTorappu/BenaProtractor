actionType: AddTileBlackboard
fields:
  _addition:
    type: number
    description: addition
    values:
      -
        value: -1
        display: false
        parse:
          type: literal
          return: -1
      -
        value: 1
        display: false
        parse:
          type: literal
          return: 1
  _additionKey:
    type: null
    description: addition Key
    values:
      -
        value: null
        display: false
        parse:
          type: literal
          return: null
  _blackboardKey:
    type: string
    description: blackboard Key
    schema: action_subschema/_blackboardKey.yml
    parse:
      type: fn
      name: parseObjectDefault
      args:
        - $input
        - $ctx
  _targetType:
    type: string
    description: target Type
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
  _useTargetOldTile:
    type: boolean
    description: use Target Old Tile
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _useTargetRootTile:
    type: boolean
    description: use Target Root Tile
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true