actionType: FilterByTargetHp
fields:
  _condType:
    type: string
    description: cond Type
    values:
      -
        value: EQUALS
        display: false
        parse:
          type: literal
          return: EQUALS
      -
        value: GT
        display: false
        parse:
          type: literal
          return: GT
      -
        value: LE
        display: false
        parse:
          type: literal
          return: LE
      -
        value: LT
        display: false
        parse:
          type: literal
          return: LT
  _hpValue:
    type: object
    description: hp Value
    schema: action_subschema/_hpValue.yml
    parse:
      type: fn
      name: parseObjectDefault
      args:
        - $input
        - $ctx
  _targetType:
    type: string
    description: target Type
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
      -
        value: BUFF_SOURCE
        display: false
        parse:
          type: literal
          return: BUFF_SOURCE
      -
        value: MODIFIER_TARGET
        display: false
        parse:
          type: literal
          return: MODIFIER_TARGET
      -
        value: TARGET
        display: false
        parse:
          type: literal
          return: TARGET