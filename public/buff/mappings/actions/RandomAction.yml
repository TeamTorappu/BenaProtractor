actionType: RandomAction
fields:
  _actions:
    type: array
    description: actions
    schema: action_subschema/_actions.yml
    parse:
      type: fn
      name: parseActionArray
      args:
        - $input
        - $ctx
  _otherwiseActions:
    type: array | null
    description: otherwise Actions
    schema: action_subschema/_otherwiseActions.yml
    parse:
      type: fn
      name: parseActionArray
      args:
        - $input
        - $ctx
  _probKey:
    type: string
    description: prob Key
    values:
      -
        value: prob
        display: false
        parse:
          type: literal
          return: prob
      -
        value: prob1
        display: false
        parse:
          type: literal
          return: prob1