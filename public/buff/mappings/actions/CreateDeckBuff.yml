actionType: CreateDeckBuff
fields:
  _deckBuff:
    type: object
    description: deck Buff
    schema: action_subschema/_deckBuff.yml
    parse:
      type: fn
      name: parseObjectDefault
      args:
        - $input
        - $ctx
  _exceptTokenAndTrap:
    type: boolean
    description: except Token And Trap
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _excludeTarget:
    type: boolean
    description: exclude Target
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _filterIsInHand:
    type: boolean
    description: filter Is In Hand
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
  _onlyToTarget:
    type: boolean
    description: only To Target
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _onlyTokenAndTrap:
    type: boolean
    description: only Token And Trap
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _randomOneDeckCard:
    type: boolean
    description: random One Deck Card
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
  _target:
    type: string
    description: target
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
      -
        value: TARGET
        display: false
        parse:
          type: literal
          return: TARGET