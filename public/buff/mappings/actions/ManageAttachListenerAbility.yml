actionType: ManageAttachListenerAbility
fields:
  _abilityName:
    type: string
    description: ability Name
    values:
      -
        value: SnowAccumulation
        display: false
        parse:
          type: literal
          return: SnowAccumulation
  _assignCastedTimesToBb:
    type: boolean
    description: assign Casted Times To Bb
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
  _blackboardKey:
    type: string
    description: blackboard Key
    schema: action_subschema/_blackboardKey.yml
    parse:
      type: fn
      name: parseObjectDefault
      args:
        - $input
        - $ctx
  _ownerType:
    type: string
    description: owner Type
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
  _removeTileListener:
    type: boolean
    description: remove Tile Listener
    values:
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _sourceType:
    type: string
    description: source Type
    values:
      -
        value: SOURCE
        display: false
        parse:
          type: literal
          return: SOURCE