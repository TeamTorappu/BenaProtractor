actionType: TriggerBuffsByKeys
fields:
  _buffKeys:
    type: array
    description: buff Keys
    schema: action_subschema/_buffKeys.yml
    parse:
      type: fn
      name: parseArrayDefault
      args:
        - $input
        - $ctx
  _excludeInTriggerAll:
    type: boolean
    description: exclude In Trigger All
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
  _excludeThisBuff:
    type: boolean
    description: exclude This Buff
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _forceTrigger:
    type: boolean
    description: force Trigger
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _targetType:
    type: string
    description: target Type
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
      -
        value: BUFF_SOURCE
        display: false
        parse:
          type: literal
          return: BUFF_SOURCE
  _triggerAllBuffs:
    type: boolean
    description: trigger All Buffs
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true