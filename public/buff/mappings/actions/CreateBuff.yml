actionType: CreateBuff
fields:
  _buff:
    type: object
    description: buff
    schema: action_subschema/_buff.yml
    parse:
      type: fn
      name: parseObjectDefault
      args:
        - $input
        - $ctx
  _buffOwner:
    type: string
    description: buff Owner
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
      -
        value: BUFF_SOURCE
        display: false
        parse:
          type: literal
          return: BUFF_SOURCE
      -
        value: MAIN_TARGET
        display: false
        parse:
          type: literal
          return: MAIN_TARGET
      -
        value: MODIFIER_SOURCE
        display: false
        parse:
          type: literal
          return: MODIFIER_SOURCE
      -
        value: MODIFIER_TARGET
        display: false
        parse:
          type: literal
          return: MODIFIER_TARGET
      -
        value: SOURCE
        display: false
        parse:
          type: literal
          return: SOURCE
      -
        value: TARGET
        display: false
        parse:
          type: literal
          return: TARGET
  _finishDerivedBuffIfParentFinish:
    type: boolean
    description: finish Derived Buff If Parent Finish
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _hookEffectKeyFromSourceProjectile:
    type: boolean
    description: hook Effect Key From Source Projectile
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _inherateSourceProjectileFromParentBuff:
    type: boolean
    description: inherate Source Projectile From Parent Buff
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _isDerivedBuff:
    type: boolean
    description: is Derived Buff
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _specialBuffSource:
    type: string
    description: special Buff Source
    values:
      -
        value: BUFF_SOURCE
        display: false
        parse:
          type: literal
          return: BUFF_SOURCE
      -
        value: MODIFIER_SOURCE
        display: false
        parse:
          type: literal
          return: MODIFIER_SOURCE
      -
        value: MODIFIER_TARGET
        display: false
        parse:
          type: literal
          return: MODIFIER_TARGET
  _useSpecialBuffSource:
    type: boolean
    description: use Special Buff Source
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true