actionType: ReplaceAbilityDamageType
fields:
  _damageType:
    type: string
    description: damage Type
    values:
      -
        value: PHYSICAL
        display: false
        parse:
          type: literal
          return: PHYSICAL
  _modes:
    type: array
    description: modes
    schema: action_subschema/_modes.yml
    parse:
      type: fn
      name: parseArrayDefault
      args:
        - $input
        - $ctx
  _targetType:
    type: string
    description: target Type
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER