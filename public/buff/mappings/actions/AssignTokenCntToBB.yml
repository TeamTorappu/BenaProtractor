actionType: AssignTokenCntToBB
fields:
  _actionTargetType:
    type: string
    description: action Target Type
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
      -
        value: BUFF_SOURCE
        display: false
        parse:
          type: literal
          return: BUFF_SOURCE
      -
        value: TARGET
        display: false
        parse:
          type: literal
          return: TARGET
  _blackboardKey:
    type: string
    description: blackboard Key
    schema: action_subschema/_blackboardKey.yml
    parse:
      type: fn
      name: parseObjectDefault
      args:
        - $input
        - $ctx
  _useTargetHost:
    type: boolean
    description: use Target Host
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true