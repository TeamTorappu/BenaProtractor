actionType: FilterByCharacterSharedBlackboard
fields:
  _blackboardKey:
    type: string
    description: blackboard Key
    schema: action_subschema/_blackboardKey.yml
    parse:
      type: fn
      name: parseObjectDefault
      args:
        - $input
        - $ctx
  _condType:
    type: string
    description: cond Type
    values:
      -
        value: EQUALS
        display: false
        parse:
          type: literal
          return: EQUALS
      -
        value: GT
        display: false
        parse:
          type: literal
          return: GT
      -
        value: LT
        display: false
        parse:
          type: literal
          return: LT
  _target:
    type: string
    description: target
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
  _valueToCompare:
    type: number
    description: value To Compare
    values:
      -
        value: 0
        display: false
        parse:
          type: literal
          return: 0
  _valueToCompareKey:
    type: string
    description: value To Compare Key
    values:
      -
        value: ""
        display: false
        parse:
          type: literal
          return: ""
      -
        value: max_respawn_cnt
        display: false
        parse:
          type: literal
          return: max_respawn_cnt
      -
        value: none
        display: false
        parse:
          type: literal
          return: none
      -
        value: value
        display: false
        parse:
          type: literal
          return: value