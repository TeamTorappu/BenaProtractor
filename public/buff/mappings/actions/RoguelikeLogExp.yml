actionType: RoguelikeLogExp
fields:
  _expKey:
    type: null | string
    description: exp Key
    values:
      -
        value: exp
        display: false
        parse:
          type: literal
          return: exp
      -
        value: null
        display: false
        parse:
          type: literal
          return: null
  _expType:
    type: string
    description: exp Type
    values:
      -
        value: ENEMY_KILLED
        display: false
        parse:
          type: literal
          return: ENEMY_KILLED
      -
        value: TRAP_GAINED
        display: false
        parse:
          type: literal
          return: TRAP_GAINED
  _target:
    type: string
    description: target
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
      -
        value: BUFF_SOURCE
        display: false
        parse:
          type: literal
          return: BUFF_SOURCE