actionType: SummonEnemiesOnAttackRange
fields:
  _abilityName:
    type: string
    description: ability Name
    values:
      -
        value: SelectEnemy
        display: false
        parse:
          type: literal
          return: SelectEnemy
  _alwaysCountAsKilled:
    type: boolean
