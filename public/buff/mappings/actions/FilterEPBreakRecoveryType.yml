actionType: FilterEPBreakRecoveryType
fields:
  _recoveryType:
    type: string
    description: recovery Type
    values:
      -
        value: DARK
        display: false
        parse:
          type: literal
          return: DARK
      -
        value: FIRE
        display: false
        parse:
          type: literal
          return: FIRE
      -
        value: SANITY
        display: false
        parse:
          type: literal
          return: SANITY
  _skipInEPBreakRecoveryCheck:
    type: boolean
    description: skip In E P Break Recovery Check
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _target:
    type: string
    description: target
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
      -
        value: MODIFIER_TARGET
        display: false
        parse:
          type: literal
          return: MODIFIER_TARGET