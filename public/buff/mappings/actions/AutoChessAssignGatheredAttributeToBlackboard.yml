actionType: AutoChessAssignGatheredAttributeToBlackboard
fields:
  _actionTargetType:
    type: string
    description: action Target Type
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
  _attributeType:
    type: string
    description: attribute Type
    values:
      -
        value: ATK
        display: false
        parse:
          type: literal
          return: ATK
      -
        value: MAX_HP
        display: false
        parse:
          type: literal
          return: MAX_HP
  _blackboardKey:
    type: string
    description: blackboard Key
    schema: action_subschema/_blackboardKey.yml
    parse:
      type: fn
      name: parseObjectDefault
      args:
        - $input
        - $ctx
  _filterByBondIds:
    type: array
    description: filter By Bond Ids
    schema: action_subschema/_filterByBondIds.yml
    parse:
      type: fn
      name: parseArrayDefault
      args:
        - $input
        - $ctx
  _scale:
    type: number
    description: scale
    values:
      -
        value: 0.5
        display: false
        parse:
          type: literal
          return: 0.5
  _scaleKey:
    type: string
    description: scale Key
    values:
      -
        value: scale_attribute
        display: false
        parse:
          type: literal
          return: scale_attribute