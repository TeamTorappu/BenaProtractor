actionType: ModifyCost
fields:
  _blackboardKey:
    type: string
    description: blackboard Key
    schema: action_subschema/_blackboardKey.yml
    parse:
      type: fn
      name: parseObjectDefault
      args:
        - $input
        - $ctx
  _forceToDisplayNegativeNumber:
    type: boolean
    description: force To Display Negative Number
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _forceToDisplayNumber:
    type: boolean
    description: force To Display Number
    values:
      -
        value: false
        display: false
        parse:
          type: literal
          return: false
      -
        value: true
        display: false
        parse:
          type: literal
          return: true
  _sourceType:
    type: string
    description: source Type
    values:
      -
        value: BUFF_OWNER
        display: false
        parse:
          type: literal
          return: BUFF_OWNER
      -
        value: BUFF_SOURCE
        display: false
        parse:
          type: literal
          return: BUFF_SOURCE
      -
        value: MAIN_TARGET
        display: false
        parse:
          type: literal
          return: MAIN_TARGET
      -
        value: MODIFIER_TARGET
        display: false
        parse:
          type: literal
          return: MODIFIER_TARGET
      -
        value: SOURCE
        display: false
        parse:
          type: literal
          return: SOURCE