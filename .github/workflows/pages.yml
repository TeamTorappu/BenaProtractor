name: Build and Deploy Pages
on:
  push:
    branches:
      - feat-tauri
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # UTC+8 10:00 自动更新
permissions:
  contents: write
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - run: pnpm install
      - run: pnpm run build


      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist